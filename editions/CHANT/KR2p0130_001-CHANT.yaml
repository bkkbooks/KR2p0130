body:
  text: 散見簡牘合輯江西南昌東湖區永外正街一號晉墓木刺木牘弟子吳應再拜問起居南昌字子遠弟子吳應再拜問起居南昌字子遠弟子吳應再拜問起居南昌字子遠豫章吳應再拜問起居南昌字子遠中郎豫章南昌都鄉吉陽里吴應年七十三字子遠故白練長裙二要故白練裏衫二領故白練複兩當一要故白練裌兩當一要故白練複袴一要故白練複羣一要故白練裌羣一要故白練襦一領故白練複衫一領故白練裌衫一領故黃麻複袍一領故黃麻單衣一領故白練複牟一枚故犀導一枚故白絹一枚故白絮巾二枚故白布𥿉一量故絲履一量故白練被一首故白絹帳一紐故白練手摳一雙故玉㹠二頭故白布手巾一枚故黃布手巾一枚故白練覆面巾一枚故練枕一枚故白布復巾一枚故嚴器一牧故銅鏡一枚故白練鏡衣一枚故白絹粉囊一枚小女傖嫫故紺䙏一領小女傖故五絲同心一枚故白布飾面巾一枚故刷一枚故練細櫛二枚故絮粉芬一枚故面脂一塸故書箱一枚故書硯一枚故筆一枚帋一百枚故墨一丸故刺五枚故流衣板一枚故棺中笙一枚故棺材一枚右𠦜七種
